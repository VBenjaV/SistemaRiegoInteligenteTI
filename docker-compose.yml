version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: riego_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    environment:
      - TZ=America/Mexico_City
    restart: unless-stopped
    networks:
      - riego_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: riego_backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=sqlite:///./riego.db
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - WEATHER_CITY=Mexico City
    volumes:
      - ./backend:/app
    depends_on:
      - mosquitto
    networks:
      - riego_network
    restart: unless-stopped

networks:
  riego_network:
    driver: bridge

volumes:
  mosquitto_config:
  mosquitto_data:
  mosquitto_log:
